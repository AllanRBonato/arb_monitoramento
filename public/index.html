<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARB Monitoramento - Redirecionando...</title>
    <style>
        body {
            background-color: #2c3e50;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader" style="margin: 0 auto 15px;"></div>
        <p>Verificando credenciais...</p>
    </div>

    <script>
        // O script executa assim que a página abre
        window.onload = function() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('userRole');

            if (!token) {
                // Não tem token? Vai pro login.
                window.location.href = 'login.html';
            } else {
                // Tem token? Manda pro painel correspondente
                if (role === 'CLIENTE' || role === 'VISUALIZADOR') {
                    window.location.href = 'project-details.html'; // Ou a página do cliente
                } else {
                    window.location.href = 'dashboard.html'; // Ou menu.html
                }
            }
        };
    </script>
</body>
